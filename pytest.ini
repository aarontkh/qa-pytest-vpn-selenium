[pytest]
testpaths = tests

# Logging — printed live to console and written to file
log_cli            = true
log_cli_level      = INFO
log_cli_format     = %(asctime)s [%(levelname)s] %(message)s
log_cli_date_format = %H:%M:%S
log_file           = starvpn_isp_test.log
log_file_level     = DEBUG
log_file_format    = %(asctime)s [%(levelname)s] %(name)s — %(message)s
log_file_date_format = %Y-%m-%d %H:%M:%S

# Markers (avoids PytestUnknownMarkWarning)
markers =
    geo:   requires a live StarVPN connection and VPN geo-switching
    smoke: fast tests with no external dependencies — safe for CI

filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
